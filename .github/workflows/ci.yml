name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test || true

  pack:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Clean old tarballs before packing
      - name: Clean old tarballs
        working-directory: packages/cli
        run: rm -f *.tgz

      # Pack CLI package
      - name: Pack CLI package
        working-directory: packages/cli
        run: npm pack

      # Verify tarball contents
      - name: Verify tarball contents
        working-directory: packages/cli
        run: |
          tar -tzf *.tgz | head -20
          echo "Checking for templates in tarball..."
          tar -tzf *.tgz | grep -q "package/templates/vanilla" && echo "Templates found!" || exit 1

  smoke-test:
    runs-on: ubuntu-latest
    needs: [pack]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Install CLI globally from tarball
      - name: Install CLI from tarball
        working-directory: packages/cli
        run: npm install -g *.tgz

      # Smoke test - verify CLI runs
      - name: Verify CLI command
        run: mv3-forge --version

      # Smoke test - create a test project
      - name: Test project creation
        run: |
          mkdir -p /tmp/smoke-test
          cd /tmp/smoke-test
          mv3-forge new smoke-project --template vanilla --yes 2>&1 || echo "Interactive mode, skipping"
          rm -rf /tmp/smoke-test